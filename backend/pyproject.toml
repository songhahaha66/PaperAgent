[project]
name = "backend"
version = "0.1.0"
description = "PaperAgent Backend API"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.136.1",
    "requests>=2.34.0",
    "uvicorn[standard]>=0.46.0",
    "python-jose[cryptography]>=3.5.0",
    "bcrypt>=5.0.0",
    "python-multipart>=0.0.28",
    "sqlalchemy>=2.0.49",
    "asyncpg>=0.31.0",
    "psycopg[binary]>=3.3.4",
    "aiosqlite>=0.22.1",
    "python-dotenv>=1.2.2",
    "pydantic[email]>=2.13.4",
    "pytest>=9.0.3",
    "numpy>=2.4.4",
    "matplotlib>=3.10.9",
    "scipy>=1.17.1",
    "pandas>=3.0.3",
    "seaborn>=0.13.2",
    "alembic>=1.18.4",
    "python-docx>=1.2.0",
    "Pillow>=12.2.0",
    "markdown>=3.10.2",
    "PyPDF2>=3.0.1",
    "pdfplumber>=0.11.9",
    "openpyxl>=3.1.5",
    "langchain>=1.2.18",
    "langchain-openai>=1.2.1",
    "langchain-community>=0.4.1",
    "smolagents>=1.24.0",
    "ddgs>=9.14.2",
    "langchain-anthropic>=1.4.3",
    "langchain-google-genai>=4.2.2",
    "pygments>=2.20.0",
    "office-word-mcp-server",
]

[tool.uv.workspace]
members = [
    "office_word_mcp",
]

[tool.uv.sources]
office-word-mcp-server = { workspace = true }
